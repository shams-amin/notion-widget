# .github/workflows/update-transfer-bonuses.yml
# Auto-refreshes transfer-bonuses.json from Frequent Miler on a schedule.
# GitHub Pages redeploys automatically whenever this commits a change.
name: Update transfer bonuses

on:
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch latest transfer bonuses
        run: python fetch_transfer_bonuses.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- transfer-bonuses.json; then
            echo "No change - nothing to commit."
          else
            git config user.name  "transfer-bonus-bot"
            git config user.email "actions@users.noreply.github.com"
            git add transfer-bonuses.json
            git commit -m "Auto-update transfer bonuses ($(date -u +%Y-%m-%d))"
            git push
          fi
